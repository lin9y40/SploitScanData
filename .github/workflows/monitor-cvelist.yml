name: cvelistV5 Monitor + Rescan

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

# Concurrency: separate from monitor-poc-sources to avoid mutual cancellation.
# Git push conflicts are handled by retry logic in the push step.
# Data is written to repo root (cves/ + state files), not output/ subdirectory.
concurrency:
  group: sploitscan-cvelist-push
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO_OWNER }}/${{ vars.SOURCE_REPO_NAME }}
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          path: ./source
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd source
          pip install -r requirements.txt

      - name: Clone Poc-Monitor-Data
        run: |
          git clone --depth 1 https://github.com/PocMonitorBot/Poc-Monitor-Data.git ./poc-monitor-data

      - name: Clone cvelistV5
        run: |
          git clone --shallow-since="14 days ago" https://github.com/CVEProject/cvelistV5.git ./cvelistV5

      - name: Run cvelistV5 monitor + rescan
        env:
          VULNCHECK_API_KEYS: ${{ secrets.VULNCHECK_API_KEYS }}
          GITHUB_TOKENS: ${{ secrets.GH_TOKENS }}
          POC_MONITOR_DATA_DIR: ${{ github.workspace }}/poc-monitor-data
        run: |
          cd source
          python monitor.py \
            --output .. \
            --cvelist-dir ../cvelistV5 \
            --mode monitor-cvelist \
            --poc-monitor-dir ${{ github.workspace }}/poc-monitor-data

      - name: Commit and push
        run: |
          git config user.name "${{ vars.BOT_NAME || 'github-actions[bot]' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}"
          git add cves/ .cvelist_state.json .source_state.json .rescan_state.json run_summary.json -f
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "cvelistV5 monitor + rescan $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            for i in 1 2 3; do
              if git push; then echo "Push OK ($i)"; break
              else echo "Retry $i..."; git pull --rebase origin main; sleep 5; fi
            done
          fi
